spring:
  datasource:
    # MySQL DB 연결
    url: jdbc:mysql://localhost:3306/studyspot?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # --- 이메일 발송 설정 ---
  mail:
    host: smtp.gmail.com
    port: 587
    username: std123spot@gmail.com
    password: uwge mpqc nkjo moml
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          timeout: 5000

  # --- 소셜 로그인 설정 ---
  security:
    oauth2:
      client:
        registration:
          # 1. 카카오 설정
          kakao:
            client-id: ${KAKAO_REST_API_KEY}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8080/login/oauth2/code/kakao"
            client-name: Kakao

          # 2. 구글 설정
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET:your-very-long-secret-key-that-is-at-least-32-bytes-studyspot}
  access-token-expiration: 3600000

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
